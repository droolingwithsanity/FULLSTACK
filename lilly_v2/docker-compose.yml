version: "3.9"

services:
  lilly_backend:
    build: ./backend
    container_name: lilly_backend
    ports:
      - "3000:3000"
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  lilly_frontend:
    build: ./frontend
    container_name: lilly_frontend
    ports:
      - "81:80"
    depends_on:
      - lilly_backend
    restart: unless-stopped
